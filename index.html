<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        (function () {
            const lang = navigator.language || navigator.userLanguage;

            if (lang.startsWith("vi")) {
                window.location.href = "index-vi.html";
            } else if (lang.startsWith("en")) {
                window.location.href = "index-en.html";
            } else {
                window.location.href = "index-en.html";
            }
        })();
    </script>
</head>
</html>
